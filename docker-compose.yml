version: '3.8'

services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: meridian-sql
    user: root
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Passw0rd!
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql/data
    networks:
      - meridian_network

  redis:
    image: redis:latest
    container_name: meridian-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - meridian_network

volumes:
  sqldata:
  redisdata:


networks:
  meridian_network:
    driver: bridge
